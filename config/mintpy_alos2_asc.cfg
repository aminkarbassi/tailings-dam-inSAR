##------ Brumadinho InSAR — MintPy Configuration (ALOS-2 PALSAR-2, Ascending) ------##
## ASCENDING pass, ALOS-2 PALSAR-2, L-band (23.6 cm wavelength)
## Data processed with ISCE2 stripmapStack.py (scripts/12_prepare_isce2_alos2.py)
## Use together with mintpy_desc155.cfg in 07_decompose_2d.py for vertical + E-W decomp.
##
## L-band vs C-band differences reflected here:
##   network.tempBaseMax     180  → 336  (L-band coherent for many months)
##   network.perpBaseMax     200  → 1500 (L-band tolerates larger perp baselines)
##   network.minCoherence    0.7  → 0.6  (slightly relaxed — L-band less affected by vegetation)
##   networkInversion.maskThreshold 0.4 → 0.3
##   correct.LOD             yes  → no   (LOD is Sentinel-1 specific)
## -----------------------------------------------------------------------------------

########## 1. Load Data (from ISCE2 stripmapStack interferograms)
mintpy.load.processor        = isce
mintpy.load.unwFile          = /home/amin/Documents/PythonProjects/EarthMovements/processing/isce2/alos2_asc/merged/interferograms/*/*.unw
mintpy.load.corFile          = /home/amin/Documents/PythonProjects/EarthMovements/processing/isce2/alos2_asc/merged/interferograms/*/*.cor
mintpy.load.connCompFile     = /home/amin/Documents/PythonProjects/EarthMovements/processing/isce2/alos2_asc/merged/interferograms/*/*.unw.conncomp
mintpy.load.intFile          = /home/amin/Documents/PythonProjects/EarthMovements/processing/isce2/alos2_asc/merged/interferograms/*/*.int
mintpy.load.demFile          = /home/amin/Documents/PythonProjects/EarthMovements/processing/isce2/alos2_asc/merged/geom_reference/hgt.rdr
mintpy.load.lookupYFile      = /home/amin/Documents/PythonProjects/EarthMovements/processing/isce2/alos2_asc/merged/geom_reference/lat.rdr
mintpy.load.lookupXFile      = /home/amin/Documents/PythonProjects/EarthMovements/processing/isce2/alos2_asc/merged/geom_reference/lon.rdr
mintpy.load.incAngleFile     = /home/amin/Documents/PythonProjects/EarthMovements/processing/isce2/alos2_asc/merged/geom_reference/los.rdr
mintpy.load.azAngleFile      = /home/amin/Documents/PythonProjects/EarthMovements/processing/isce2/alos2_asc/merged/geom_reference/los.rdr
mintpy.load.shadowMaskFile   = /home/amin/Documents/PythonProjects/EarthMovements/processing/isce2/alos2_asc/merged/geom_reference/shadowMask.rdr
mintpy.load.waterMaskFile    = no

########## 2. Modify Network
## L-band stays coherent over much longer temporal baselines than C-band.
mintpy.network.coherenceBased = yes
mintpy.network.minCoherence   = 0.6
mintpy.network.tempBaseMax    = 336    # 24 × 14-day ALOS-2 repeat cycles
mintpy.network.perpBaseMax    = 1500   # L-band: much larger baseline tolerance

########## 3. Reference Point
## Same bedrock reference as Sentinel-1 tracks for cross-sensor consistency.
mintpy.reference.lalo         = -20.06,-44.08
mintpy.reference.maskFile     = maskTempCoh.h5

########## 4. Unwrapping Error Correction
## ISCE2 stripmapStack produces conncomp files — use bridging to fix errors.
mintpy.unwrapError.method     = bridging

########## 5. Inversion (SBAS)
mintpy.networkInversion.weightFunc      = no
mintpy.networkInversion.minNormVelocity = yes
mintpy.networkInversion.maskDataset     = coherence
mintpy.networkInversion.maskThreshold   = 0.3

########## 6. Local Oscillator Drift Correction
## LOD is specific to Sentinel-1 — disabled for ALOS-2.
mintpy.correct.LOD            = no

########## 7. Tropospheric Delay Correction
## ERA5 correction applies to all C- and L-band SAR equally.
mintpy.troposphericDelay.method       = pyaps
mintpy.troposphericDelay.weatherModel = ERA5

########## 8. Deramping
mintpy.deramp                 = linear

########## 9. Topographic Residual Correction
mintpy.topographicResidual    = yes

########## 10. Residual RMS
mintpy.residualRMS.maskFile   = maskTempCoh.h5
mintpy.residualRMS.ramp       = quadratic
mintpy.residualRMS.threshold  = 0.02

########## 11. Reference Date
mintpy.reference.date         = auto

########## 12. Velocity
mintpy.velocity.startDate     = 20170701
mintpy.velocity.endDate       = 20190125

########## 13. Geocoding
## *** laloStep MUST match Sentinel-1 configs for valid 2D decomposition ***
mintpy.geocode.laloStep       = -0.0001,0.0001
mintpy.geocode.SNWE           = -20.30,-19.92,-44.35,-43.95
mintpy.geocode.fillValue      = nan

########## 14. Google Earth Output
mintpy.save.kmz               = yes

########## Working Directory
mintpy.workDir                = /home/amin/Documents/PythonProjects/EarthMovements/processing/mintpy/alos2_asc
